services:
  db:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: C#as$$fNXotZx2sNW$$hj&aw9c
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streaming-scoreboard
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:C#as$$fNXotZx2sNW$$hj&aw9c@db:5432/postgres?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
    ports:
      - "3000:3000"

volumes:
  pgdata:
