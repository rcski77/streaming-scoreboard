services:
  db:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    # Use an env-file chosen at runtime. Set ENV_FILE to switch (e.g. ENV_FILE=.env.prod).
    env_file:
      - ${ENV_FILE:-.env.prod}
    volumes:
      - pgdata:/var/lib/postgresql

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    depends_on:
      - db
    # Adminer kept on the internal network only. Uncomment the ports mapping
    # below if you need external access for troubleshooting.
    # ports:
    #   - "8080:8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streaming-scoreboard
    restart: unless-stopped
    depends_on:
      - db
    # Use the same runtime-selectable env-file for the web service.
    env_file:
      - ${ENV_FILE:-.env.prod}
    ports:
      - "3000:3000"

volumes:
  pgdata:
